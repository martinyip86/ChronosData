services:
  collector-binance:
    build: . 
    container_name: collector-binance
    restart: always    

    env_file:
      - .env

    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./src:/app/src
    
    environment:
      - PYTHONPATH=/app
      - EXCHANGE=binance

    command: python /app/src/collectors/stream_manager.py --exchange binance

    deploy:
      resources:
        limits:
          memory: 5G
        reservations:
          memory: 2G

    depends_on:
      quant_redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy

  collector-okx:
    build: .               
    container_name: collector-okx
    restart: always        

    env_file:
      - .env

    volumes:
      - ./data:/app/data    
      - ./logs:/app/logs    
      - ./src:/app/src
    
    environment:
      - PYTHONPATH=/app
      - EXCHANGE=okx
      - RUN_MODE=${OKX_RUN_MODE:-direct}

    command: >
      sh -c "if [ \"$$RUN_MODE\" = \"sync\" ]; then
              python /app/src/workers/sync_db.py
            else
              python /app/src/collectors/stream_manager.py --exchange okx
            fi"

    deploy:
      resources:
        limits:
          memory: 5G
        reservations:
          memory: 2G

    depends_on:
      quant_redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy

  syncer:
    build: .
    container_name: syncer-server
    restart: always

    env_file:
      - .env

    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./src:/app/src

    environment:
      - PYTHONPATH=/app

    command: python /app/src/workers/db_syncer.py

    deploy:
      resources:
        limits:
          memory: 10G
        reservations:
          memory: 4G

    depends_on:
      quant_redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy

  gap_filler:
    build: .
    container_name: gap-filler-worker
    restart: always

    env_file:
      - .env

    volumes:
      - ./logs:/app/logs
      - ./src:/app/src

    environment:
      - PYTHONPATH=/app

    command: python /app/src/workers/gap_filler.py

    deploy:
      resources:
        limits:
          memory: 10G
        reservations:
          memory: 4G

    depends_on:
      quant_redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy

  gap_detector:
    build: .
    container_name: gap-detector-worker
    restart: always

    env_file:
      - .env

    volumes:
      - ./logs:/app/logs
      - ./src:/app/src

    environment:
      - PYTHONPATH=/app

    command: python /app/src/workers/gap_detector.py

    deploy:
      resources:
        limits:
          memory: 10G
        reservations:
          memory: 4G

    depends_on:
      quant_redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy

  ofelia:
    image: mcuadros/ofelia:latest
    container_name: quant_ofelia
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: daemon --docker

  daily_patcher:
    build: .
    container_name: quant_daily_patcher
    command: tail -f /dev/null
    volumes:
      - .:/app:cached
    environment:
      - PYTHONPATH=/app
    labels:
      ofelia.enabled: "true"
      ofelia.job-exec.daily_full_sync.schedule: "0 0 9 * * *"
      ofelia.job-exec.daily_full_sync.command: "python -m src.pipeline_runner"
    tty: true
    stdin_open: true

  #控制组件
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./infra/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./infra/monitoring/prometheus/prometheus_data:/prometheus
    ports:
      - "9090:9090"
    
  pushgateway:
    image: prom/pushgateway:latest
    ports:
      - "9091:9091"

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=administration
    volumes:
      - ./infra/monitoring/grafana/grafana_data:/var/lib/grafana
    user: "472"   # 关键：Grafana 容器内部默认使用 ID 为 472 的用户，需要对齐权限
    depends_on:
      - prometheus

  quant_redis:
    image: redis:alpine
    container_name: quant_redis_service
    ports:
      - "6380:6379"
    command: redis-server --maxmemory 2gb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2.5G

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: clickhouse-server
    environment:
      - CLICKHOUSE_USER=${CLICKHOUSE_USERNAME}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - ./infra/clickhouse/clickhouse_data:/var/lib/clickhouse
      - ./infra/clickhouse/clickhouse_logs:/var/log/clickhouse-server
      - ./data:/var/lib/clickhouse/user_files/data
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    # deploy:
    #   resources:
    #     limits:
    #       memory: 4G
    restart: always

  